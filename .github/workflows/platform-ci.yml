name: SynapseMD Platform CI

on:
  push:
    paths:
      - "platform/**"
      - "tests/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/platform-ci.yml"
  pull_request:
    paths:
      - "platform/**"
      - "tests/**"
      - "deploy/**"
      - "pyproject.toml"
      - ".github/workflows/platform-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e "./platform[dev]"
          pip install pytest pytest-cov pytest-asyncio ruff pip-audit

      - name: Lint
        run: ruff check platform/synapsemd_platform tests

      - name: Unit and integration tests with coverage
        run: pytest tests/ -v --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Dependency audit
        working-directory: platform
        run: pip-audit || true

  release-gates:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e "./platform[dev]"
          pip install pytest pytest-cov pytest-asyncio

      - name: Release gate tests
        run: pytest tests/release/ -v

      - name: Model eval regression tests
        run: pytest tests/eval/ -v
