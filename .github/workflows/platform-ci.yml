name: SynapseMD Platform CI

on:
  push:
    paths:
      - "platform/**"
      - "tests/**"
      - "deploy/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "platform/**"
      - "tests/**"
      - "deploy/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: platform
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check platform/synapsemd_platform tests

      - name: Tests
        run: pytest -v

      - name: Dependency audit
        working-directory: platform
        run: pip-audit || true
