apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapsemd-api
  namespace: synapsemd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapsemd-api
  template:
    metadata:
      labels:
        app: synapsemd-api
    spec:
      containers:
        - name: api
          image: synapsemd/platform:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: synapsemd-config
            - secretRef:
                name: synapsemd-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: synapsemd-api
  namespace: synapsemd
spec:
  selector:
    app: synapsemd-api
  ports:
    - port: 80
      targetPort: 8000
