groups:
  - name: synapsemd-alerts
    rules:
      - alert: SynapseMDHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: SynapseMD API error rate above 1%

      - alert: SynapseMDPHIBlockSpike
        expr: increase(phi_block_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Elevated PHI block rate — possible anonymization failure or abuse

      - alert: SynapseMDGuardrailBlockSpike
        expr: increase(guardrail_block_total[5m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Guardrail blocks elevated — review command patterns

      - alert: SynapseMDLLMLatencyHigh
        expr: histogram_quantile(0.95, rate(llm_latency_seconds_bucket[5m])) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: LLM p95 latency above 30s
