apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: synapsemd-config
      data:
        APP_ENV: "production"
        LLM_DEFAULT_PROVIDER: "anthropic"
        ANTHROPIC_BAA_SIGNED: "true"
        OPENAI_BAA_SIGNED: "true"
        GOOGLE_BAA_SIGNED: "true"
        PRESIDIO_ENABLED: "true"
        PHI_BLOCK_ON_FAILURE: "true"
        AUDIT_USE_KAFKA: "true"
        AUDIT_USE_MEMORY: "false"
        ORG_INTELLIGENCE_ENABLED: "false"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: synapsemd-api
      spec:
        replicas: 3
