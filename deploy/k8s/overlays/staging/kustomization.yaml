apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: synapsemd-config
      data:
        APP_ENV: "staging"
        LLM_DEFAULT_PROVIDER: "mock"
        ANTHROPIC_BAA_SIGNED: "false"
        PRESIDIO_ENABLED: "true"
        PHI_BLOCK_ON_FAILURE: "true"
        AUDIT_USE_KAFKA: "true"
        ORG_INTELLIGENCE_ENABLED: "false"
